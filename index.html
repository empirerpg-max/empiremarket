<!DOCTYPE html>
<html lang="pt-br">
<header class="profile-header">
    <div class="avatar-wrapper">
        <img src="" id="artist-photo" class="avatar">
        <div id="status-indicator" class="status-dot"></div>
    </div>
    <h1 id="artist-name">Carregando...</h1>
    <div id="activity-banner" class="activity-banner">
        <span id="current-activity">Verificando agenda...</span>
    </div>
</header>

        <div class="glass-card main-stats">
            <p>Saldo Empire Coins</p>
            <h2 id="artist-saldo">$EC 0</h2>
            <p class="fortuna-label">Fortuna Total: <span id="artist-fortuna">$0</span></p>
        </div>

        <div class="stats-group">
            <div class="stat-bar">
                <label>Prestígio <span id="txt-prestigio">0/1000</span></label>
                <div class="progress-bg"><div id="bar-prestigio" class="progress gold"></div></div>
            </div>
            <div class="stat-bar">
                <label>Fadiga <span id="txt-fadiga">0%</span></label>
                <div class="progress-bg"><div id="bar-fadiga" class="progress red"></div></div>
            </div>
        </div>

        <nav class="actions-grid">
            <div class="action-btn">🎤<span>Tour</span></div>
            <div class="action-btn">🎬<span>Cinema</span></div>
            <div class="action-btn">🏢<span>Negócios</span></div>
            <div class="action-btn">🛒<span>Loja</span></div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
