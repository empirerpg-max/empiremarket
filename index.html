<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire Market - Perfil</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container" id="main-content">
        <header class="profile-header">
            <div class="avatar-wrapper">
                <img src="" id="artist-photo" class="avatar">
                <div id="status-dot" class="status-dot"></div>
            </div>
            <h1 id="artist-name">Carregando...</h1>
            <div id="activity-banner" class="activity-banner">
                <span id="current-activity">Verificando agenda...</span>
            </div>
        </header>

        <div class="glass-card main-stats">
            <p class="label-small">SALDO EMPIRE COINS</p>
            <h2 id="artist-saldo">$EC 0</h2>
            <p class="fortuna-label">Patrimônio Líquido: <span id="artist-fortuna">$0</span></p>
        </div>

        <div class="stats-group">
            <div class="stat-bar">
                <div class="stat-info"><span>PRESTÍGIO</span><span id="txt-prestigio" class="val-num">0/1000</span></div>
                <div class="progress-bg"><div id="bar-prestigio" class="progress gold"></div></div>
            </div>
            <div class="stat-bar">
                <div class="stat-info"><span>FADIGA</span><span id="txt-fadiga" class="val-num">0%</span></div>
                <div class="progress-bg"><div id="bar-fadiga" class="progress red"></div></div>
            </div>
        </div>

        <nav class="actions-grid">
            <div class="action-btn" onclick="alert('Menu de Tours em breve!')">
                <span class="icon">🎤</span><span>Tour</span>
            </div>
            <div class="action-btn" onclick="openCinema()">
                <span class="icon">🎬</span><span>Cinema</span>
            </div>
            <div class="action-btn" onclick="alert('Negócios em breve!')">
                <span class="icon">🏢</span><span>Business</span>
            </div>
            <div class="action-btn" onclick="alert('Mercado em breve!')">
                <span class="icon">🛒</span><span>Market</span>
            </div>
        </nav>
    </div>

    <div id="modal-cinema" class="modal-overlay">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h3>Hollywood Casting</h3>
                <button class="close-btn" onclick="closeCinema()">✕</button>
            </div>
            <p class="modal-desc">Escolha seu próximo projeto:</p>
            
            <div class="option-list">
                <button class="option-card" onclick="contratarFilme('Filme Independente')">
                    <div class="option-text">
                        <span class="opt-title">Filme Independente</span>
                        <span class="opt-price">$EC 250.000</span>
                    </div>
                    <span class="opt-badge">+50 P</span>
                </button>

                <button class="option-card" onclick="contratarFilme('Papel em Série TV')">
                    <div class="option-text">
                        <span class="opt-title">Papel em Série TV</span>
                        <span class="opt-price">$EC 1.200.000</span>
                    </div>
                    <span class="opt-badge">+30 P</span>
                </button>

                <button class="option-card" onclick="contratarFilme('Blockbuster Cinema')">
                    <div class="option-text">
                        <span class="opt-title">Blockbuster Cinema</span>
                        <span class="opt-price">$EC 5.000.000</span>
                    </div>
                    <span class="opt-badge">+10 P</span>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
